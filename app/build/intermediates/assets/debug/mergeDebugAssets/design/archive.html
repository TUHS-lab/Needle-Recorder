<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Journal Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --base-color: #EAE6DF;
        --highlight: #FFFFFF;
        --shadow: #CFC9C0;
        --shadow-deep: #B5AEA3;
        --text-primary: #2C2A28;
        --text-muted: #8F8B84;
        --vinyl-base: #1C1B1A;
        --accent-red: #DE533E;
        --font-serif: 'Playfair Display', Georgia, serif;
        --font-mono: 'Space Mono', 'Courier New', monospace;
        --bezel-inset: inset 0 3px 6px rgba(0,0,0,0.06), inset 0 1px 2px rgba(0,0,0,0.1), 0 1px 0 rgba(255,255,255,0.7);
        --btn-outset: 0 4px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.15), inset 0 2px 2px rgba(255,255,255,0.9);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
        background-color: var(--base-color);
        color: var(--text-primary);
        font-family: var(--font-mono);
        min-height: 100vh;
        background-image: radial-gradient(circle at 50% 0%, #F5F3EF 0%, #E0DCD4 100%);
        overflow-x: hidden;
    }

    .device {
        width: 100%; max-width: 480px; margin: 0 auto;
        min-height: 100vh; display: flex; flex-direction: column;
    }

    .header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 24px 24px 16px;
        font-size: 0.7rem; letter-spacing: 2px; font-weight: 700;
        color: var(--text-muted);
        position: sticky; top: 0;
        background: rgba(234,230,223,0.92);
        backdrop-filter: blur(10px); z-index: 100;
    }

    .back-btn {
        cursor: pointer; color: var(--text-primary);
        display: flex; align-items: center; gap: 8px;
    }
    .back-btn:active { opacity: 0.6; }

    .archive-stage { flex: 1; padding: 20px 24px; }

    .archive-title {
        font-family: var(--font-serif); font-size: 2.2rem;
        font-style: italic; margin-bottom: 32px; color: #383532;
    }

    .empty-state {
        text-align: center; padding: 60px 24px;
        color: var(--text-muted);
        font-size: 0.8rem; letter-spacing: 2px;
        display: none;
    }

    .archive-grid {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 16px; padding-bottom: 40px;
    }

    .album-sleeve {
        aspect-ratio: 1/1;
        background: #DDD7CD; border-radius: 4px;
        box-shadow: var(--bezel-inset); padding: 6px;
        position: relative; cursor: pointer;
        transition: transform 0.2s ease;
    }

    .album-sleeve:active { transform: scale(0.97); }

    .sleeve-content {
        width: 100%; height: 100%;
        background: var(--base-color);
        box-shadow: 0 4px 10px rgba(0,0,0,0.1), inset 0 1px 1px rgba(255,255,255,0.8);
        border-radius: 2px; padding: 12px;
        display: flex; flex-direction: column;
        justify-content: space-between;
        position: relative; overflow: hidden;
    }

    .album-spine {
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 4px; background: rgba(0,0,0,0.05);
        border-right: 1px solid rgba(0,0,0,0.05);
    }

    .album-date {
        font-size: 0.6rem; font-weight: 700;
        letter-spacing: 1px; color: var(--text-muted);
    }

    .album-day {
        font-family: var(--font-serif); font-size: 1.3rem;
        font-style: italic; color: var(--text-primary); margin-top: 4px;
    }

    .album-time {
        font-size: 0.55rem; color: var(--text-muted);
        margin-top: 2px; letter-spacing: 1px;
    }

    .album-mood-tag {
        align-self: flex-start;
        font-size: 0.55rem; font-weight: 700;
        letter-spacing: 1px; padding: 4px 8px;
        border: 1px solid var(--shadow-deep);
        border-radius: 20px; color: var(--text-muted);
        text-transform: uppercase; margin-top: auto;
    }

    .vinyl-peek {
        position: absolute; right: -15px; top: 10%; bottom: 10%;
        width: 40px; background: var(--vinyl-base);
        border-radius: 50%; z-index: -1; opacity: 0.7;
    }

    .nav-bar {
        height: 80px; background: #DCD6CC;
        box-shadow: inset 0 1px 0 var(--highlight);
        display: flex; justify-content: center; align-items: center;
        padding: 0 24px 20px;
        position: sticky; bottom: 0;
    }

    .home-btn {
        width: 100%; height: 50px; border: none; border-radius: 8px;
        background: linear-gradient(180deg, #FAFAF8 0%, #E8E4DB 100%);
        box-shadow: var(--btn-outset);
        font-family: var(--font-mono); font-weight: 700;
        letter-spacing: 2px; color: var(--text-primary); cursor: pointer;
    }

    .home-btn:active { transform: translateY(2px); }
</style>
</head>
<body>

<div class="device">

    <div class="header">
        <div class="back-btn" onclick="goHome()">‹ SYS.BACK</div>
        <div id="count-label">VOLS // 0</div>
    </div>

    <div class="archive-stage">
        <h1 class="archive-title">The Library</h1>

        <div class="empty-state" id="empty-state">
            NO RECORDINGS YET.<br>START YOUR FIRST SESSION.
        </div>

        <div class="archive-grid" id="archive-grid"></div>
    </div>

    <div class="nav-bar">
        <button class="home-btn" onclick="goHome()">RETURN TO DECK</button>
    </div>

</div>

<script>
    const MOODS = ['Pensive','Light','Somber','Grateful','Chaotic','Quiet','Heavy','Inspired','Open','Restless'];

    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        return Math.floor(s/60).toString().padStart(2,'0') + ':' + (s%60).toString().padStart(2,'0');
    }

    function stablePickMood(fileName) {
        let hash = 0;
        for (let i = 0; i < fileName.length; i++) hash += fileName.charCodeAt(i);
        return MOODS[hash % MOODS.length];
    }

    function loadRecordings() {
        let recordings = [];

        if (typeof Android !== 'undefined') {
            try {
                recordings = JSON.parse(Android.getRecordingsList());
            } catch (e) {
                recordings = [];
            }
        }

        const grid  = document.getElementById('archive-grid');
        const empty = document.getElementById('empty-state');

        document.getElementById('count-label').textContent = `VOLS // ${recordings.length}.0`;

        if (recordings.length === 0) {
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';
        grid.innerHTML = '';

        recordings.forEach((rec, i) => {
            const mood  = stablePickMood(rec.fileName);
            const sleeve = document.createElement('div');
            sleeve.className = 'album-sleeve';
            sleeve.innerHTML = `
                <div class="vinyl-peek"></div>
                <div class="sleeve-content">
                    <div class="album-spine"></div>
                    <div>
                        <div class="album-date">${rec.date}</div>
                        <div class="album-day">${rec.day}</div>
                        <div class="album-time">${rec.time}</div>
                    </div>
                    <div class="album-mood-tag">${mood}</div>
                </div>`;

            sleeve.addEventListener('click', () => {
                localStorage.setItem('currentPlayback', rec.filePath);
                if (typeof Android !== 'undefined') Android.navigateTo('playback.html');
            });

            grid.appendChild(sleeve);
        });
    }

    function goHome() {
        if (typeof Android !== 'undefined') Android.navigateTo('index.html');
    }

    window.addEventListener('load', loadRecordings);
</script>

</body>
</html>
