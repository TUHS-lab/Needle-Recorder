<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voice Journal — Playback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --base-color: #EAE6DF;
        --highlight: #FFFFFF;
        --shadow: #CFC9C0;
        --shadow-deep: #B5AEA3;
        --text-primary: #2C2A28;
        --text-muted: #8F8B84;
        --vinyl-base: #1C1B1A;
        --accent-red: #DE533E;
        --font-serif: 'Playfair Display', Georgia, serif;
        --font-mono: 'Space Mono', 'Courier New', monospace;
        --bezel-inset: inset 0 3px 6px rgba(0,0,0,0.06), inset 0 1px 2px rgba(0,0,0,0.1), 0 1px 0 rgba(255,255,255,0.7);
        --btn-outset: 0 4px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.15), inset 0 2px 2px rgba(255,255,255,0.9);
        --btn-active: 0 1px 2px rgba(0,0,0,0.1), 0 0px 0px rgba(0,0,0,0.1), inset 0 2px 4px rgba(0,0,0,0.08), inset 0 1px 1px rgba(255,255,255,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
        background-color: var(--base-color);
        color: var(--text-primary);
        font-family: var(--font-mono);
        height: 100vh; width: 100vw;
        display: flex; justify-content: center; align-items: center;
        background-image: radial-gradient(circle at 50% 0%, #F5F3EF 0%, #E0DCD4 100%);
        overflow: hidden;
    }

    .device {
        width: 100%; max-width: 480px;
        height: 100vh;
        display: flex; flex-direction: column; position: relative;
    }

    .header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 24px 32px 16px;
        font-size: 0.7rem; letter-spacing: 2px; font-weight: 700;
        color: var(--text-muted);
    }

    .back-btn {
        cursor: pointer; display: flex; align-items: center; gap: 8px;
        color: var(--text-primary);
    }
    .back-btn:active { opacity: 0.6; }

    .power-light {
        width: 10px; height: 10px;
        background: #4CAF50;
        border: 1px solid #111;
        box-shadow: inset 0 1px 2px rgba(255,255,255,0.4), 0 0 5px rgba(76,175,80,0.4);
    }

    .stage {
        flex: 1; display: flex; flex-direction: column; padding: 32px; position: relative;
    }

    .meta-data {
        font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
        color: var(--text-muted); margin-bottom: 8px;
    }

    .prompt {
        font-family: var(--font-serif); font-size: 2.2rem; font-style: italic;
        font-weight: 400; line-height: 1.15; color: #383532; width: 100%;
        text-shadow: 0 1px 1px rgba(255,255,255,0.8); margin-bottom: auto;
    }

    .vinyl-assembly {
        align-self: center; position: relative; margin-top: 20px;
        width: 200px; height: 200px;
    }

    .vinyl-bezel {
        position: absolute; inset: -16px; border-radius: 50%;
        background: var(--base-color); box-shadow: var(--bezel-inset);
    }

    .vinyl-disc {
        position: absolute; inset: 0; border-radius: 50%;
        background: var(--vinyl-base);
        box-shadow: 0 12px 24px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.2);
        display: flex; justify-content: center; align-items: center; z-index: 2;
        background-image:
            radial-gradient(circle, transparent 30%, rgba(255,255,255,0.03) 31%, transparent 32%),
            radial-gradient(circle, transparent 45%, rgba(255,255,255,0.05) 46%, transparent 47%),
            radial-gradient(circle, transparent 60%, rgba(255,255,255,0.04) 61%, transparent 62%),
            radial-gradient(circle, transparent 75%, rgba(255,255,255,0.06) 76%, transparent 77%);
        transition: animation 0.3s;
    }

    .vinyl-label {
        width: 72px; height: 72px; border-radius: 50%;
        background: #D9D3C8; border: 2px solid #111;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        position: relative; z-index: 4;
    }

    .label-text { font-size: 0.45rem; font-weight: 700; color: var(--text-primary); letter-spacing: 1px; }

    .vinyl-hole {
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--base-color);
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.6); margin: 8px 0;
    }

    .tonearm {
        position: absolute; top: 10px; right: -20px;
        width: 120px; height: 9px;
        background: linear-gradient(90deg, #A8A196 0%, #C4BDB1 100%);
        border-radius: 5px;
        transform-origin: 90% 50%;
        transform: rotate(-15deg);
        box-shadow: 0 8px 12px rgba(0,0,0,0.25);
        z-index: 9;
        transition: transform 0.5s cubic-bezier(0.5,0,0.2,1);
    }

    body.is-paused .tonearm { transform: rotate(-40deg); }

    .scrubber-container { padding: 32px 32px 16px; }

    .scrubber-track {
        width: 100%; height: 12px;
        background: #DDD7CD; border-radius: 6px;
        box-shadow: var(--bezel-inset);
        position: relative; overflow: hidden;
        cursor: pointer;
    }

    .scrubber-progress {
        position: absolute; top: 0; left: 0; height: 100%; width: 0%;
        background: linear-gradient(90deg, #B5AEA3, #8F8B84);
        box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
        transition: width 0.5s linear;
        pointer-events: none;
    }

    .scrubber-time {
        display: flex; justify-content: space-between; margin-top: 10px;
        font-size: 0.65rem; font-weight: 700; color: var(--text-muted);
    }

    .controls { padding: 16px 32px 48px; }

    .housing {
        width: 100%; height: 96px;
        background: #DCD6CC; border-radius: 12px;
        box-shadow: var(--bezel-inset);
        padding: 10px; display: flex; gap: 10px;
    }

    .btn {
        flex: 1; border: none; outline: none; border-radius: 8px;
        background: linear-gradient(180deg, #FAFAF8 0%, #E8E4DB 100%);
        box-shadow: var(--btn-outset);
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: all 0.1s ease;
    }

    .btn:active { transform: translateY(2px); box-shadow: var(--btn-active); }

    /* Play icon */
    .icon-play {
        width: 0; height: 0;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        border-left: 18px solid var(--text-primary);
        margin-left: 4px;
    }

    /* Pause icon */
    .icon-pause { display: flex; gap: 5px; }
    .pause-bar { width: 5px; height: 20px; background: var(--text-primary); border-radius: 2px; }

    .btn-speed {
        font-weight: 700; font-size: 0.8rem;
        color: var(--text-primary); letter-spacing: 1px;
    }

    .btn-delete {
        flex: 0.5;
        font-size: 1.2rem; color: var(--text-muted);
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
    }

    body.is-playing .vinyl-disc { animation: spin 2s linear infinite; }
</style>
</head>
<body class="is-playing">

<div class="device">

    <div class="header">
        <div class="back-btn" onclick="goBack()">
            <span>‹ BACK</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <div class="power-light"></div>
            <span>PLAYBACK</span>
        </div>
    </div>

    <div class="stage">
        <div class="meta-data" id="meta-date">—</div>
        <h1 class="prompt" id="meta-name">Loading...</h1>

        <div class="vinyl-assembly">
            <div class="vinyl-bezel"></div>
            <div class="vinyl-disc">
                <div class="vinyl-label">
                    <span class="label-text">SIDE A</span>
                    <div class="vinyl-hole"></div>
                    <span class="label-text" id="duration-label">00:00</span>
                </div>
            </div>
            <div class="tonearm"></div>
        </div>
    </div>

    <div class="scrubber-container">
        <div class="scrubber-track" id="scrubber" onclick="onScrubberClick(event)">
            <div class="scrubber-progress" id="progress-bar"></div>
        </div>
        <div class="scrubber-time">
            <span id="time-current">00:00</span>
            <span id="time-total">00:00</span>
        </div>
    </div>

    <div class="controls">
        <div class="housing">
            <button class="btn" id="play-btn" onclick="togglePlay()">
                <div class="icon-pause" id="play-icon">
                    <div class="pause-bar"></div>
                    <div class="pause-bar"></div>
                </div>
            </button>
            <button class="btn" style="flex:0.5;" onclick="cycleSpeed()">
                <span class="btn-speed" id="speed-label">1.0×</span>
            </button>
            <button class="btn btn-delete" onclick="deleteAndGoBack()">🗑</button>
        </div>
    </div>

</div>

<script>
    const filePath = localStorage.getItem('currentPlayback') || '';

    let isPlaying  = true;
    let speedIdx   = 0;
    const speeds   = [1.0, 1.25, 1.5, 2.0, 0.75];
    let progressInterval = null;

    // ─── Meta ─────────────────────────────────────────────────────────────────
    function displayMeta() {
        if (!filePath) {
            document.getElementById('meta-name').textContent = 'No recording';
            return;
        }

        const parts = filePath.split('/');
        const name  = parts[parts.length - 1].replace('rec_', '').replace('.m4a', '');
        document.getElementById('meta-name').textContent = formatFileName(name);

        try {
            const ts = parseTimestamp(name);
            if (ts) {
                document.getElementById('meta-date').textContent =
                    ts.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }).toUpperCase() +
                    ' // ' + ts.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            }
        } catch (e) {}
    }

    function formatFileName(name) {
        // "20241024_214200" → clean label
        if (/^\d{8}_\d{6}$/.test(name)) {
            const d = parseTimestamp(name);
            return d ? d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) : name;
        }
        return name;
    }

    function parseTimestamp(str) {
        const m = str.match(/^(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})$/);
        if (!m) return null;
        return new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]);
    }

    function formatTime(ms) {
        const s   = Math.floor(ms / 1000);
        const min = Math.floor(s / 60).toString().padStart(2, '0');
        const sec = (s % 60).toString().padStart(2, '0');
        return `${min}:${sec}`;
    }

    // ─── Playback ─────────────────────────────────────────────────────────────
    function startPlayback() {
        if (!filePath || typeof Android === 'undefined') return;
        Android.playRecording(filePath);
        startProgressTracking();
    }

    function startProgressTracking() {
        clearInterval(progressInterval);
        progressInterval = setInterval(updateProgress, 500);
    }

    function updateProgress() {
        if (typeof Android === 'undefined') return;
        const pos      = Android.getPlaybackPosition();
        const duration = Android.getPlaybackDuration();

        if (duration > 0) {
            const pct = (pos / duration) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('time-current').textContent = formatTime(pos);
            document.getElementById('time-total').textContent   = formatTime(duration);
            document.getElementById('duration-label').textContent = formatTime(duration);
        }
    }

    function togglePlay() {
        if (typeof Android === 'undefined') return;
        const state = Android.togglePlayback();
        if (state === 'paused') {
            isPlaying = false;
            document.body.classList.remove('is-playing');
            document.body.classList.add('is-paused');
            document.getElementById('play-icon').innerHTML =
                '<div style="width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:18px solid #2C2A28;margin-left:4px;"></div>';
        } else {
            isPlaying = true;
            document.body.classList.add('is-playing');
            document.body.classList.remove('is-paused');
            document.getElementById('play-icon').innerHTML =
                '<div class="pause-bar"></div><div class="pause-bar"></div>';
        }
    }

    function cycleSpeed() {
        speedIdx = (speedIdx + 1) % speeds.length;
        const spd = speeds[speedIdx];
        document.getElementById('speed-label').textContent = spd.toFixed(2).replace(/\.00$/, '.0') + '×';
        // MediaPlayer не поддерживает setPlaybackParams через JS-интерфейс легко,
        // поэтому это визуальный индикатор; расширение возможно через дополнительный метод
    }

    function onScrubberClick(e) {
        if (typeof Android === 'undefined') return;
        const rect  = e.currentTarget.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        const dur   = Android.getPlaybackDuration();
        if (dur > 0) {
            Android.seekTo(Math.floor(ratio * dur));
            updateProgress();
        }
    }

    function onPlaybackFinished() {
        isPlaying = false;
        document.body.classList.remove('is-playing');
        document.body.classList.add('is-paused');
        document.getElementById('progress-bar').style.width = '100%';
        document.getElementById('play-icon').innerHTML =
            '<div style="width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:18px solid #2C2A28;margin-left:4px;"></div>';
        clearInterval(progressInterval);
    }

    // ─── Navigation ──────────────────────────────────────────────────────────
    function goBack() {
        if (typeof Android !== 'undefined') {
            Android.stopPlayback();
            Android.navigateTo('index.html');
        }
        clearInterval(progressInterval);
    }

    function deleteAndGoBack() {
        if (typeof Android === 'undefined') return;
        if (!confirm('Delete this recording?')) return;
        Android.stopPlayback();
        Android.deleteRecording(filePath);
        Android.navigateTo('archive.html');
        clearInterval(progressInterval);
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    window.addEventListener('load', () => {
        displayMeta();
        startPlayback();
    });
</script>

</body>
</html>
